  # Placeholder so codemagic.yaml remains valid
  android-web-check:
    name: Web Build Check
    max_build_duration: 15
    instance_type: linux_x2
    environment:
      node: 20
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true
    scripts:
      - name: Install dependencies
        script: npm ci
      - name: Build Next.js
        script: npm run build
    publishing:
      email:
        recipients:
          - mayegamustafa@gmail.com
        notify:
          success: false
          failure: true
